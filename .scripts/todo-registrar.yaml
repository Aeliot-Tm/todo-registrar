paths:
  in: .
  append: bin/todo-registrar
  exclude:
    - tests/fixtures
    - var
    - vendor

registrar:
  type: GitHub
  options:
    issue:
      addTagToLabels: true
      labels:
        - tech-debt
      tagPrefix: tag-
      showContext: numbered
      contextTitle: "## Added in position:"
    service:
      personalAccessToken: "%env(GH_PERSONAL_ACCESS_TOKEN)%"
      repository: "%env(GITHUB_REPOSITORY)%"

tags:
  - todo
  - fixme
