name: TODO in PR Statistic

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  statistic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Aeliot-Tm/todo-registrar-statistic-action@4e65a4d0f5f361f6aa95a3b8b60c7a55e35138a0
        with:
          config: |
            paths:
              in: .
              append: bin/todo-registrar
              exclude:
                - tests/fixtures
                - var
                - vendor
            process:
              glueSameTickets: true
              glueSequentialComments: true
            registrar:
              type: DryRun
            tags:
              - todo
              - fixme
