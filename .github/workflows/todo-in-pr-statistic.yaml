name: TODO in PR Statistic

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  statistic:
    uses: Aeliot-Tm/todo-registrar-statistic-action/.github/workflows/statistic.yaml@316c6eabcd03e117fcd846f22fcd045d25a8008a
    with:
      config: |
        paths:
          in: .
          append: bin/todo-registrar
          exclude:
            - tests/fixtures
            - var
            - vendor
        process:
          glueSameTickets: true
          glueSequentialComments: true
        registrar:
          type: DryRun
        tags:
          - todo
          - fixme
